<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Muscle Annotation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #111;
  --surface: #181818;
  --surface2: #202020;
  --border: #272727;
  --dim: #333;
  --mid: #555;
  --label: #888;
  --body: #bbb;
  --white: #fff;
  --accent: #6e7bf2;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
  --safe-l: env(safe-area-inset-left, 0px);
  --safe-r: env(safe-area-inset-right, 0px);
}

html {
  -webkit-text-size-adjust: 100%;
  scroll-behavior: smooth;
}

body {
  font-family: "IBM Plex Sans", -apple-system, sans-serif;
  background: var(--bg);
  color: var(--body);
  font-size: 15px;
  line-height: 1.5;
  padding:
    calc(20px + var(--safe-top))
    calc(16px + var(--safe-r))
    calc(64px + var(--safe-bot))
    calc(16px + var(--safe-l));
  min-height: 100dvh;
  -webkit-overflow-scrolling: touch;
  overflow-x: hidden;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 4px;
}
h1 {
  font-family: "IBM Plex Mono", monospace;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--white);
}
.save-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--dim);
  flex-shrink: 0;
  transition: background 0.2s, transform 0.2s;
}
.save-dot.saving { background: var(--accent); transform: scale(1.6); }
.save-dot.saved { background: var(--white); transform: scale(1); }

.subtitle {
  font-family: "IBM Plex Mono", monospace;
  font-size: 11px;
  color: var(--mid);
  letter-spacing: 0.04em;
  margin-bottom: 20px;
}

/* ── Progress ── */
.progress-row {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
  padding: 12px 0;
  background: var(--bg);
}
.progress-bar {
  flex: 1; height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--white);
  border-radius: 2px;
  width: 0%;
  transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
}
.progress-pct {
  font-family: "IBM Plex Mono", monospace;
  font-size: 12px;
  color: var(--mid);
  min-width: 36px;
  text-align: right;
  transition: color 0.3s;
}

/* ── View Tabs (primary nav) ── */
.view-tabs {
  display: flex;
  gap: 3px;
  margin-bottom: 24px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.view-tabs::-webkit-scrollbar { display: none; }
.tab {
  flex: 1;
  min-width: 0;
  padding: 10px 0;
  text-align: center;
  font-family: "IBM Plex Mono", monospace;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  cursor: pointer;
  background: var(--surface);
  color: var(--mid);
  border-radius: 4px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  user-select: none;
  transition: background 0.13s, color 0.13s, transform 0.1s;
}
.tab:active { transform: scale(0.965); }
.tab.active { background: var(--white); color: var(--bg); }

/* ── View Panels ── */
.view-panel { display: none; }
.view-panel.active {
  display: block;
  animation: fadeSlide 0.17s ease forwards;
}
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── Region heading (body area within a view) ── */
.region {
  margin-bottom: 20px;
}
.region-header {
  display: flex;
  align-items: baseline;
  margin-bottom: 6px;
  padding: 0 4px;
}
.region-label {
  font-family: "IBM Plex Mono", monospace;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--label);
}
.region-count {
  font-family: "IBM Plex Mono", monospace;
  font-size: 11px;
  color: var(--dim);
  margin-left: auto;
  transition: color 0.25s;
}
.region-count.complete { color: var(--accent); }

.region-step {
  font-family: "IBM Plex Mono", monospace;
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 0.06em;
  padding: 0 4px;
  margin-right: 8px;
}

/* ── Paired L/R grid ── */
.pair-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 1px;
}
.pair-grid .item-full {
  grid-column: 1 / -1;
}

/* ── Item ── */
.item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  min-height: 44px;
  background: var(--surface);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  user-select: none;
  transition: background 0.1s ease, opacity 0.22s ease, transform 0.14s ease;
  will-change: transform, opacity;
  min-width: 0;
  border-radius: 2px;
}
.item:active {
  background: var(--surface2);
  transform: scale(0.984);
}
.item.done { opacity: 0.28; }
.item.done .item-name {
  text-decoration: line-through;
  text-decoration-color: var(--dim);
}
.item.checking {
  animation: checkIn 0.2s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes checkIn {
  0% { transform: scale(1); }
  45% { transform: scale(0.972); }
  100%{ transform: scale(1); }
}

/* ── Checkbox ── */
.check {
  width: 18px; height: 18px;
  border: 1.5px solid var(--mid);
  border-radius: 3px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition:
    background 0.16s ease,
    border-color 0.16s ease,
    transform 0.16s cubic-bezier(0.34,1.56,0.64,1);
}
.item.done .check {
  background: var(--white);
  border-color: var(--white);
  transform: scale(1.08);
}
.checkmark {
  opacity: 0;
  transform: scale(0.4) rotate(-12deg);
  transition:
    opacity 0.14s ease 0.04s,
    transform 0.17s cubic-bezier(0.34,1.56,0.64,1) 0.04s;
  width: 10px; height: 10px;
}
.item.done .checkmark {
  opacity: 1;
  transform: scale(1) rotate(0deg);
}

.item-name {
  font-family: "IBM Plex Mono", monospace;
  font-size: 12px;
  color: var(--body);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: color 0.2s;
}
.item-side {
  font-family: "IBM Plex Mono", monospace;
  font-size: 10px;
  color: var(--mid);
  letter-spacing: 0.06em;
  flex-shrink: 0;
  background: var(--surface2);
  padding: 2px 6px;
  border-radius: 3px;
}
.item-step {
  font-family: "IBM Plex Mono", monospace;
  font-size: 9px;
  color: var(--dim);
  flex-shrink: 0;
  white-space: nowrap;
  min-width: 16px;
  text-align: center;
}

/* ── View summary ── */
.view-summary {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 20px;
  padding: 0 4px;
}
.view-summary-label {
  font-family: "IBM Plex Mono", monospace;
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.view-summary-count {
  font-family: "IBM Plex Mono", monospace;
  font-size: 12px;
  color: var(--mid);
  margin-left: auto;
  transition: color 0.25s;
}
.view-summary-count.complete { color: var(--accent); }

/* ── Reset ── */
.reset-btn {
  display: inline-block;
  margin-top: 40px;
  margin-bottom: 20px;
  padding: 10px 22px;
  background: transparent;
  color: var(--dim);
  font-family: "IBM Plex Mono", monospace;
  font-size: 12px;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  cursor: pointer;
  border: 1px solid var(--border);
  border-radius: 4px;
  min-height: 44px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  user-select: none;
  transition: color 0.13s, border-color 0.13s, transform 0.1s;
}
.reset-btn:active { color: var(--label); border-color: var(--mid); transform: scale(0.97); }

/* ═══════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════ */

@media (min-width: 480px) {
  body {
    padding-left: calc(20px + var(--safe-l));
    padding-right: calc(20px + var(--safe-r));
  }
  .pair-grid {
    grid-template-columns: 1fr 1fr;
  }
}

@media (min-width: 680px) {
  body {
    padding-left: calc(32px + var(--safe-l));
    padding-right: calc(32px + var(--safe-r));
    font-size: 16px;
  }
  h1 { font-size: 15px; }
  .subtitle { font-size: 12px; }
  .region-label { font-size: 12px; }
  .region-count { font-size: 12px; }
  .item-name { font-size: 13px; }
  .item { padding: 11px 14px; }
  .tab { font-size: 13px; padding: 11px 0; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    transition-duration: 0.01ms !important;
    animation-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>

<div class="header">
  <h1>Muscle Annotation</h1>
  <div class="save-dot" id="saveDot"></div>
</div>
<p class="subtitle">Pick a view · work top-to-bottom · tap to check off</p>

<div class="progress-row">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <span class="progress-pct" id="progressPct">0%</span>
</div>

<!-- ── Primary navigation: by photo view ── -->
<div class="view-tabs">
  <div class="tab active" data-view="front">Front</div>
  <div class="tab" data-view="back">Back</div>
  <div class="tab" data-view="left">Left</div>
  <div class="tab" data-view="right">Right</div>
</div>

<div id="panels"></div>

<button class="reset-btn" onclick="confirmReset()">Reset all</button>

<script>
/* ═══════════════════════════════════════════
   DATA — organized by photo view, top-to-bottom
   
   Each view has regions (body areas) listed in the
   order you'd scan a reference photo from head to toe.
   
   Within each region:
     center = bilateral / midline muscles (full-width row)
     sides  = paired L/R muscles (shown in 2-col grid)
   ═══════════════════════════════════════════ */

const views = {
  front: {
    label: "Front View",
    regions: [
      { name: "Neck",
        center: [],
        sides: ["neck_sternocleidomastoid"] },

      { name: "Traps",
        center: [],
        sides: ["trapezius_upper"] },

      { name: "Shoulders",
        center: [],
        sides: ["delt_anterior"] },

      { name: "Chest",
        center: [],
        sides: ["pec_major"] },

      { name: "Upper Arms",
        center: [],
        sides: ["bicep", "bicep_brachialis"] },

      { name: "Forearms",
        center: [],
        sides: ["forearm_flexor", "forearm_brachioradialis"] },

      { name: "Core",
        center: ["rectus_abdominis"],
        sides: ["oblique_external"] },

      { name: "Quads",
        center: [],
        sides: ["quad_rectus_femoris", "quad_vastus_lateralis", "quad_vastus_medialis"] },

      { name: "Inner Thigh",
        center: [],
        sides: ["adductor"] },

      { name: "Calves",
        center: [],
        sides: ["gastrocnemius"] },

      { name: "Shins",
        center: [],
        sides: ["tibialis_anterior"] },
    ]
  },

  back: {
    label: "Back View",
    regions: [
      { name: "Neck",
        center: ["neck_posterior"],
        sides: [] },

      { name: "Traps",
        center: [],
        sides: ["trapezius_upper", "trapezius_middle", "trapezius_lower"] },

      { name: "Shoulders",
        center: [],
        sides: ["delt_posterior"] },

      { name: "Upper Back",
        center: [],
        sides: ["rhomboid", "infraspinatus", "teres_major"] },

      { name: "Lats & Lower Back",
        center: [],
        sides: ["lat", "erector_spinae"] },

      { name: "Upper Arms",
        center: [],
        sides: ["tricep"] },

      { name: "Forearms",
        center: [],
        sides: ["forearm_extensor"] },

      { name: "Glutes",
        center: [],
        sides: ["glute_max", "glute_med"] },

      { name: "Hamstrings",
        center: [],
        sides: ["hamstring_bicep_femoris", "hamstring_semimembranosus", "hamstring_semitendinosus"] },

      { name: "Calves",
        center: [],
        sides: ["gastrocnemius", "soleus"] },
    ]
  },

  left: {
    label: "Left Side View",
    regions: [
      { name: "Neck",
        center: [],
        left: ["neck_sternocleidomastoid_l"] },

      { name: "Traps",
        center: [],
        left: ["trapezius_upper_l"] },

      { name: "Shoulders",
        center: [],
        left: ["delt_anterior_l", "delt_lateral_l", "delt_posterior_l"] },

      { name: "Chest",
        center: [],
        left: ["pec_major_l"] },

      { name: "Upper Arms",
        center: [],
        left: ["bicep_l", "tricep_l"] },

      { name: "Forearms",
        center: [],
        left: ["forearm_flexor_l", "forearm_extensor_l"] },

      { name: "Core",
        center: [],
        left: ["rectus_abdominis_l", "serratus_anterior_l", "oblique_external_l"] },

      { name: "Back",
        center: [],
        left: ["lat_l", "erector_spinae_l"] },

      { name: "Glutes",
        center: [],
        left: ["glute_max_l", "glute_med_l"] },

      { name: "Legs",
        center: [],
        left: ["quad_vastus_lateralis_l", "hamstring_bicep_femoris_l"] },

      { name: "Calves",
        center: [],
        left: ["gastrocnemius_l", "soleus_l"] },
    ]
  },

  right: {
    label: "Right Side View",
    regions: [
      { name: "Neck",
        center: [],
        right: ["neck_sternocleidomastoid_r"] },

      { name: "Traps",
        center: [],
        right: ["trapezius_upper_r"] },

      { name: "Shoulders",
        center: [],
        right: ["delt_anterior_r", "delt_lateral_r", "delt_posterior_r"] },

      { name: "Chest",
        center: [],
        right: ["pec_major_r"] },

      { name: "Upper Arms",
        center: [],
        right: ["bicep_r", "tricep_r"] },

      { name: "Forearms",
        center: [],
        right: ["forearm_flexor_r", "forearm_extensor_r"] },

      { name: "Core",
        center: [],
        right: ["rectus_abdominis_r", "serratus_anterior_r", "oblique_external_r"] },

      { name: "Back",
        center: [],
        right: ["lat_r", "erector_spinae_r"] },

      { name: "Glutes",
        center: [],
        right: ["glute_max_r", "glute_med_r"] },

      { name: "Legs",
        center: [],
        right: ["quad_vastus_lateralis_r", "hamstring_bicep_femoris_r"] },

      { name: "Calves",
        center: [],
        right: ["gastrocnemius_r", "soleus_r"] },
    ]
  }
};

/* ═══════════════════
   PERSISTENCE
   ═══════════════════ */
const KEY = 'muscleChecklist_v3';
let state = {};
let saveTimer = null;

function loadState() {
  for (const store of [localStorage, sessionStorage]) {
    try { const r = store.getItem(KEY); if (r) { state = JSON.parse(r); return; } } catch(e) {}
  }
}

function writeStorages(data) {
  const s = JSON.stringify(data);
  try { localStorage.setItem(KEY, s); } catch(e) {}
  try { sessionStorage.setItem(KEY, s); } catch(e) {}
}

let db = null;
function openIDB() {
  if (!window.indexedDB) return;
  const req = indexedDB.open('MuscleAnnotation', 1);
  req.onupgradeneeded = e => e.target.result.createObjectStore('kv');
  req.onsuccess = e => {
    db = e.target.result;
    if (Object.keys(state).length === 0) {
      db.transaction('kv','readonly').objectStore('kv').get(KEY).onsuccess = ev => {
        if (ev.target.result) { state = ev.target.result; writeStorages(state); renderFromState(); }
      };
    }
  };
}

function writeIDB(data) {
  if (!db) return;
  db.transaction('kv','readwrite').objectStore('kv').put(data, KEY);
}

const dot = document.getElementById('saveDot');
function save() {
  writeStorages(state);
  writeIDB(state);
  dot.className = 'save-dot saving';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => { dot.className = 'save-dot saved'; }, 300);
}
function saveNow() { writeStorages(state); writeIDB(state); }
document.addEventListener('visibilitychange', () => { if (document.visibilityState==='hidden') saveNow(); });
window.addEventListener('pagehide', saveNow);
window.addEventListener('beforeunload', saveNow);
window.addEventListener('blur', saveNow);

/* ═══════════════════
   ITEM FACTORY
   ═══════════════════ */
function checkSVG() {
  return `<div class="check"><svg class="checkmark" viewBox="0 0 8 8" fill="none"><path d="M1 4l2.5 2.5L7 1.5" stroke="#111" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`;
}

function makeItem(name, opts = {}) {
  const div = document.createElement('div');
  div.className = 'item' + (state[name] ? ' done' : '') + (opts.full ? ' item-full' : '');
  div.dataset.name = name;

  const side = name.endsWith('_l') ? 'L' : name.endsWith('_r') ? 'R' : '';
  const display = name.replace(/_[lr]$/, '');

  div.innerHTML =
    checkSVG() +
    (opts.step ? `<span class="item-step">${opts.step}</span>` : '') +
    `<span class="item-name">${display}</span>` +
    (side ? `<span class="item-side">${side}</span>` : '');

  const toggle = () => {
    state[name] = !state[name];
    save();
    document.querySelectorAll(`[data-name="${name}"]`).forEach(el => {
      el.classList.toggle('done', !!state[name]);
      el.classList.remove('checking');
      void el.offsetWidth;
      el.classList.add('checking');
      el.addEventListener('animationend', () => el.classList.remove('checking'), { once: true });
    });
    updateProgress();
    updateAllCounts();
  };

  div.addEventListener('click', toggle);
  div.addEventListener('touchend', e => { e.preventDefault(); toggle(); }, { passive: false });
  return div;
}

/* ═══════════════════
   COLLECT ALL UNIQUE NAMES (for progress)
   ═══════════════════ */
function getAllNames() {
  const all = new Set();
  Object.values(views).forEach(v => {
    v.regions.forEach(r => {
      (r.center || []).forEach(n => all.add(n));
      if (r.sides) {
        r.sides.forEach(base => { all.add(base + '_l'); all.add(base + '_r'); });
      }
      if (r.left) r.left.forEach(n => all.add(n));
      if (r.right) r.right.forEach(n => all.add(n));
    });
  });
  return all;
}

function updateProgress() {
  const allNames = getAllNames();
  const total = allNames.size;
  const done = [...allNames].filter(n => state[n]).length;
  const pct = Math.round(done / total * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  const el = document.getElementById('progressPct');
  el.textContent = pct + '%';
  el.style.color = pct === 100 ? 'var(--white)' : '';
}

/* ═══════════════════
   BUILD VIEW PANELS
   ═══════════════════ */
const panelsEl = document.getElementById('panels');
let stepCounters = {}; // viewKey -> regionIndex -> step counter

function getRegionNames(region) {
  const names = [];
  (region.center || []).forEach(n => names.push(n));
  if (region.sides) {
    region.sides.forEach(base => { names.push(base + '_l'); names.push(base + '_r'); });
  }
  if (region.left) region.left.forEach(n => names.push(n));
  if (region.right) region.right.forEach(n => names.push(n));
  return names;
}

Object.entries(views).forEach(([viewKey, viewDef]) => {
  const panel = document.createElement('div');
  panel.className = 'view-panel' + (viewKey === 'front' ? ' active' : '');
  panel.id = `view-${viewKey}`;

  // View-level summary
  const allViewNames = [];
  viewDef.regions.forEach(r => allViewNames.push(...getRegionNames(r)));

  const summary = document.createElement('div');
  summary.className = 'view-summary';
  summary.innerHTML =
    `<span class="view-summary-label">${viewDef.label} · top → bottom</span>` +
    `<span class="view-summary-count" id="viewcount-${viewKey}">0/${allViewNames.length}</span>`;
  panel.appendChild(summary);

  let globalStep = 1;

  viewDef.regions.forEach((region, rIdx) => {
    const regionEl = document.createElement('div');
    regionEl.className = 'region';

    const regionNames = getRegionNames(region);

    // Region header with step range
    regionEl.innerHTML =
      `<div class="region-header">` +
      `<span class="region-label">${region.name}</span>` +
      `<span class="region-count" id="rcount-${viewKey}-${rIdx}">0/${regionNames.length}</span>` +
      `</div>`;

    const grid = document.createElement('div');
    grid.className = 'pair-grid';

    // Center/bilateral items first
    (region.center || []).forEach(name => {
      grid.appendChild(makeItem(name, { full: true, step: globalStep++ }));
    });

    // Paired L/R items
    if (region.sides) {
      region.sides.forEach(base => {
        const stepNum = globalStep++;
        grid.appendChild(makeItem(base + '_l', { step: stepNum }));
        grid.appendChild(makeItem(base + '_r', { step: stepNum }));
      });
    }

    // Single-side items (left/right views)
    if (region.left) {
      region.left.forEach(name => {
        grid.appendChild(makeItem(name, { full: true, step: globalStep++ }));
      });
    }
    if (region.right) {
      region.right.forEach(name => {
        grid.appendChild(makeItem(name, { full: true, step: globalStep++ }));
      });
    }

    regionEl.appendChild(grid);
    panel.appendChild(regionEl);
  });

  panelsEl.appendChild(panel);
});

/* ═══════════════════
   COUNTS
   ═══════════════════ */
function updateAllCounts() {
  Object.entries(views).forEach(([viewKey, viewDef]) => {
    let viewTotal = 0, viewDone = 0;

    viewDef.regions.forEach((region, rIdx) => {
      const names = getRegionNames(region);
      const done = names.filter(n => state[n]).length;
      viewTotal += names.length;
      viewDone += done;

      const el = document.getElementById(`rcount-${viewKey}-${rIdx}`);
      if (el) {
        el.textContent = `${done}/${names.length}`;
        el.classList.toggle('complete', done === names.length);
      }
    });

    const viewEl = document.getElementById(`viewcount-${viewKey}`);
    if (viewEl) {
      viewEl.textContent = `${viewDone}/${viewTotal}`;
      viewEl.classList.toggle('complete', viewDone === viewTotal);
    }
  });
}

function renderFromState() {
  document.querySelectorAll('.item').forEach(el => {
    el.classList.toggle('done', !!state[el.dataset.name]);
  });
  updateProgress();
  updateAllCounts();
}

/* ═══════════════════
   TAB NAVIGATION
   ═══════════════════ */
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const view = tab.dataset.view;
    document.querySelectorAll('.view-panel').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    document.getElementById(`view-${view}`).classList.add('active');
    tab.classList.add('active');
  });
});

/* ═══════════════════
   RESET
   ═══════════════════ */
function confirmReset() {
  const btn = document.querySelector('.reset-btn');
  if (btn.dataset.confirm === '1') {
    Object.keys(state).forEach(k => delete state[k]);
    save();
    document.querySelectorAll('.item').forEach(el => el.classList.remove('done'));
    updateProgress();
    updateAllCounts();
    btn.textContent = 'Reset all';
    delete btn.dataset.confirm;
  } else {
    btn.textContent = 'Tap again to confirm';
    btn.dataset.confirm = '1';
    setTimeout(() => { btn.textContent = 'Reset all'; delete btn.dataset.confirm; }, 2800);
  }
}

/* ═══════════════════
   INIT
   ═══════════════════ */
loadState();
openIDB();
updateProgress();
updateAllCounts();
renderFromState();
</script>
